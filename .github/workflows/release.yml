name: Release LSP Assets

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-server:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            asset_name: shanhai-translate-lsp-server-darwin-aarch64.tar.gz
            binary_name: shanhai-translate-lsp-server
            package_kind: tar.gz
          - runner: macos-13
            asset_name: shanhai-translate-lsp-server-darwin-x86_64.tar.gz
            binary_name: shanhai-translate-lsp-server
            package_kind: tar.gz
          - runner: ubuntu-24.04-arm
            asset_name: shanhai-translate-lsp-server-linux-aarch64.tar.gz
            binary_name: shanhai-translate-lsp-server
            package_kind: tar.gz
          - runner: ubuntu-24.04
            asset_name: shanhai-translate-lsp-server-linux-x86_64.tar.gz
            binary_name: shanhai-translate-lsp-server
            package_kind: tar.gz
          - runner: windows-2022
            asset_name: shanhai-translate-lsp-server-windows-x86_64.zip
            binary_name: shanhai-translate-lsp-server.exe
            package_kind: zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release server
        run: cargo build --manifest-path server/Cargo.toml --release
      - name: Package asset (Unix)
        if: matrix.package_kind == 'tar.gz'
        shell: bash
        run: |
          mkdir -p dist/package
          cp "server/target/release/${{ matrix.binary_name }}" "dist/package/${{ matrix.binary_name }}"
          chmod +x "dist/package/${{ matrix.binary_name }}"
          tar -czf "dist/${{ matrix.asset_name }}" -C dist/package "${{ matrix.binary_name }}"
      - name: Package asset (Windows)
        if: matrix.package_kind == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/package | Out-Null
          Copy-Item "server/target/release/${{ matrix.binary_name }}" "dist/package/${{ matrix.binary_name }}"
          Compress-Archive -Path "dist/package/${{ matrix.binary_name }}" -DestinationPath "dist/${{ matrix.asset_name }}" -Force
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-server
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
